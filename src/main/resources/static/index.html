<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PR Review Assistant</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AI PR Review Assistant</h1>
            <p class="header-subtitle">轻量 Review 工具 &mdash; Web Demo</p>
        </header>

        <form id="review-form" class="review-form" novalidate>
            <div class="mode-switcher">
                <button type="button" class="mode-btn active" data-mode="pr-url">GitHub PR 链接</button>
                <button type="button" class="mode-btn" data-mode="local-diff">本地 Diff</button>
            </div>

            <div id="mode-pr-url" class="mode-panel">
                <div class="input-group">
                    <label for="pr-url" class="input-label">GitHub PR 链接</label>
                    <input
                        type="url"
                        id="pr-url"
                        class="input-field"
                        placeholder="https://github.com/owner/repo/pull/123"
                        autocomplete="off"
                    >
                    <p class="input-hint" id="url-hint"></p>
                </div>
            </div>

            <div id="mode-local-diff" class="mode-panel hidden">
                <div class="input-group">
                    <label for="diff-text" class="input-label">
                        本地 Diff 文本（<code>git diff</code> 输出）
                    </label>
                    <textarea
                        id="diff-text"
                        class="input-field diff-textarea"
                        placeholder="粘贴 git diff 或 git diff main...HEAD 的输出结果..."
                        rows="8"
                    ></textarea>
                    <p class="input-hint" id="diff-hint"></p>
                </div>
            </div>

            <div class="input-group context-mode-group">
                <label for="analysis-mode" class="input-label">Review Context 策略</label>
                <select id="analysis-mode" class="input-field select-field">
                    <option value="FAST" selected>FAST 快速模式：优先关键上下文，响应更快</option>
                    <option value="DEEP">DEEP 深度模式：更宽上下文预算，覆盖更完整</option>
                </select>
                <p class="mode-tip">FAST 更省 token、更适合日常自查；DEEP 适合大 PR 或关键模块，响应更慢、消耗更高。</p>
            </div>

            <fieldset class="credential-panel">
                <legend>临时凭证</legend>
                <div class="credential-grid">
                    <div class="input-group">
                        <label for="deepseek-api-key" class="input-label">DeepSeek API Key</label>
                        <input
                            type="password"
                            id="deepseek-api-key"
                            class="input-field"
                            placeholder="可选；留空则使用服务端环境变量"
                            autocomplete="off"
                            spellcheck="false"
                        >
                    </div>
                    <div class="input-group">
                        <label for="github-token" class="input-label">GitHub Token</label>
                        <input
                            type="password"
                            id="github-token"
                            class="input-field"
                            placeholder="可选；私有仓库或发布评论时使用"
                            autocomplete="off"
                            spellcheck="false"
                        >
                    </div>
                </div>
                <p class="credential-tip">临时凭证只随本次请求发送，不写入数据库、不回显到页面、不保存到浏览器本地存储。公开部署时请使用 HTTPS。</p>
            </fieldset>

            <button type="submit" id="submit-btn" class="btn-primary">
                开始分析
            </button>
        </form>

        <div id="result-area" class="result-area" aria-live="polite"></div>
    </div>

    <footer class="footer">
        <p>Web 页面为当前 Demo 入口。未来可扩展为 IDE 插件、浏览器插件、CLI/脚本、CI Bot，各入口复用同一套后端 Review 分析能力（<code>/api/reviews/analyze</code> 与 <code>/api/reviews/analyze-diff</code>）。</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/render.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
